name: Update latest news

on:
  schedule:
    - cron: "0 14 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Refresh latest news on schedule
        if: github.event_name == 'schedule'
        run: node scripts/update-news.mjs --scheduled-window

      - name: Refresh latest news manually
        if: github.event_name == 'workflow_dispatch'
        run: node scripts/update-news.mjs --force

      - name: Verify website and news archive
        run: |
          node tests/dashboard.test.mjs
          node tests/news.test.mjs
          node tests/news-data.test.mjs
          node tests/news-updater.test.mjs
          node tests/automation.test.mjs
          node --check app.js
          node --check news.js
          node --check scripts/news-lib.mjs
          node --check scripts/update-news.mjs

      - name: Commit refreshed news archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --quiet -- data/news-data.json || (git add data/news-data.json && git commit -m "Refresh latest news" && git push)
